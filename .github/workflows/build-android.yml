name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap
        run: |
          bubblewrap updateConfig --jdkPath="$JAVA_HOME" --androidSdkPath="$ANDROID_HOME"

      - name: Create TWA project
        run: |
          bubblewrap init --directory=twa --manifest="https://thunderous-torrone-1fb7cc.netlify.app/manifest.json" --skipPwaValidation

      - name: Build APK
        run: |
          cd twa
          bubblewrap build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            twa/**/*.apk
            twa/**/*.aab
